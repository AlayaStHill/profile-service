    // syntax-regler, default-värden etc.
    syntax = "proto3";

    // avgör vilket namespace genererade c#-filer får.
    option csharp_namespace = "ProfileService.Contracts.Protos";

    package profile;

    service ProfileGrpcService {
      rpc GetProfile (GetProfileRequest) returns (ProfileReply);

      rpc UpdateProfile (UpdateProfileRequest) returns (ProfileReply);

      rpc DeleteProfile (DeleteProfileRequest) returns (DeleteProfileReply);
    }

    // genererar GetProfileRequest.cs bakom kulissen
    message GetProfileRequest {
      string user_id = 1;
    }

    message ProfileReply {
      string user_id = 1;
      string email = 2;
      string first_name = 3;
      string last_name = 4;
      string phone_number = 5;
      string description = 6;
      string image_url = 7;
    }

    
    message UpdateProfileRequest {
      string user_id = 1;
      string first_name = 2;
      string last_name = 3;
      string phone_number = 4;
      string description = 5;
      string image_url = 6;
    }

    message DeleteProfileRequest {
      string user_id = 1;
    }

    message DeleteProfileReply {
      bool success = 1;
    }